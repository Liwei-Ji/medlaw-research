<style>
/* medlaw-qa — chat UI styles */
html,body{margin:0;height:100%}

.chat-root{
    --page:#f7f7f8; --surface:#ffffff; --surface-2:#f4f5f7; --bubble-user:#eef4fb;
    --ink:#1f2329; --ink-2:#4c525c; --muted:#8a909b; --hair:#e7e8ec; --hair-2:#eceef1;
    --accent:#2a6fd6; --accent-ink:#1c5cab; --ring:rgba(31,35,41,.10);
    --tag:#eaf1fb; --tag-ink:#1c5cab;
    --shadow:0 1px 2px rgba(16,19,25,.05); --shadow-lg:0 12px 40px rgba(16,19,25,.10);
    color-scheme:light;
  }
  /* 預設為淺色；深色僅在使用者按下切換鈕（data-theme="dark"）時套用 */
  :root[data-theme="light"] .chat-root{--page:#f7f7f8;--surface:#ffffff;--surface-2:#f4f5f7;--bubble-user:#eef4fb;--ink:#1f2329;--ink-2:#4c525c;--muted:#8a909b;--hair:#e7e8ec;--hair-2:#eceef1;--accent:#2a6fd6;--accent-ink:#1c5cab;--ring:rgba(31,35,41,.10);--tag:#eaf1fb;--tag-ink:#1c5cab;color-scheme:light;}
  :root[data-theme="dark"] .chat-root{--page:#0f1012;--surface:#1a1c1f;--surface-2:#212327;--bubble-user:#243244;--ink:#ececed;--ink-2:#b6bbc4;--muted:#868c96;--hair:#2a2c31;--hair-2:#26282c;--accent:#4a92e8;--accent-ink:#7fb0ee;--ring:rgba(255,255,255,.12);--tag:#1b2735;--tag-ink:#8fbdf2;color-scheme:dark;}

  .chat-root *{box-sizing:border-box}
  .chat-root{font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif;background:var(--page);color:var(--ink);
    height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;line-height:1.6}
  /* header */
  .hd{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:11px clamp(14px,4vw,26px);background:transparent}
  .hd .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .mark{width:30px;height:30px;border-radius:8px;flex:none;background:linear-gradient(150deg,var(--accent),var(--accent-ink));
    color:#fff;display:grid;place-items:center;font-weight:800;font-size:15px;box-shadow:var(--shadow)}
  .brand .t{font-weight:700;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand .s{font-size:11.5px;color:var(--muted);white-space:nowrap}
  .pill{font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--tag-ink);background:var(--tag);
    padding:3px 8px;border-radius:999px;white-space:nowrap}
  .hbtn{border:1px solid var(--hair);background:var(--surface);color:var(--ink-2);border-radius:8px;padding:7px 10px;
    font-size:12px;font-weight:600;cursor:pointer}
  .hbtn:hover{border-color:var(--ring)}
  a.hbtn{text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  a.hbtn.stats{color:var(--tag-ink);background:var(--tag);border-color:transparent}
  a.hbtn.stats:hover{border-color:var(--accent)}
  .hd .right{display:flex;align-items:center;gap:8px;margin-left:auto}
  @media(max-width:560px){.brand .s{display:none}.pill{display:none}}

  /* scroll area */
  .scroll{flex:1;overflow-y:auto;scroll-behavior:smooth;
    scrollbar-width:none;scrollbar-color:transparent transparent}
  .scroll::-webkit-scrollbar{width:0;height:0}
  .scroll::-webkit-scrollbar-track{background:transparent}
  .scroll::-webkit-scrollbar-thumb{background:transparent}
  .col{max-width:760px;margin:0 auto;padding:26px clamp(14px,4vw,22px) 12px}

  /* empty state */
  .empty{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:6vh 0 4vh;gap:6px}
  .empty h1{font-size:clamp(20px,3vw,26px);font-weight:750;letter-spacing:-.015em;margin:0}
  .empty p{color:var(--ink-2);font-size:14px;max-width:46ch;margin:2px 0 0}
  .examples{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:560px;margin-top:22px}
  @media(max-width:520px){.examples{grid-template-columns:1fr}}
  .ex{text-align:left;border:1px solid var(--hair);background:var(--surface);border-radius:12px;padding:12px 14px;
    cursor:pointer;transition:border-color .12s,transform .06s}
  .ex:hover{border-color:var(--accent);transform:translateY(-1px)}
  .ex .q{font-size:13.5px;font-weight:600;color:var(--ink)}
  .ex .h{font-size:11.5px;color:var(--muted);margin-top:3px}

  /* messages */
  .msg{display:flex;gap:12px;margin:20px 0;align-items:flex-start}
  .msg.user{flex-direction:row-reverse}
  .av{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;font-weight:700;font-size:13px}
  .av.bot{background:linear-gradient(150deg,var(--accent),var(--accent-ink));color:#fff}
  .av.me{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--hair)}
  .body{min-width:0;max-width:calc(100% - 44px)}
  .msg.user .body{display:flex;justify-content:flex-end}
  .bubble{border-radius:14px;padding:11px 15px;font-size:14.5px}
  .msg.user .bubble{background:var(--bubble-user);color:var(--ink);border-top-right-radius:5px;max-width:100%}
  .msg.bot .bubble{background:transparent;padding-left:0;padding-top:3px}
  .bubble p{margin:0 0 8px}.bubble p:last-child{margin-bottom:0}
  .bubble b{font-weight:700}
  .bubble .muted-note{color:var(--muted);font-size:12.5px}
  .caret::after{content:'';display:inline-block;width:.58em;height:.58em;border-radius:50%;
    background:var(--accent);vertical-align:middle;margin:0 1px 2px 2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* stat chip inside answer */
  .statline{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 10px}
  .stat{background:var(--surface-2);border:1px solid var(--hair);border-radius:10px;padding:8px 12px}
  .stat .n{font-size:19px;font-weight:770;font-variant-numeric:tabular-nums;color:var(--accent-ink)}
  .stat .l{font-size:11px;color:var(--muted);margin-top:1px}

  /* source cards */
  .src-h{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:12px 0 8px}
  .cards{display:flex;flex-direction:column;gap:8px}
  .card{border:1px solid var(--hair);background:var(--surface);border-radius:12px;padding:11px 13px;
    transition:border-color .12s}
  .card:hover{border-color:var(--ring)}
  .card .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .tags{display:flex;gap:5px;flex-wrap:wrap}
  .lt{font-size:10.5px;font-weight:700;color:var(--tag-ink);background:var(--tag);padding:2px 7px;border-radius:999px}
  .card .num{font-size:13.5px;font-weight:680;color:var(--ink)}
  .card .meta{font-size:12px;color:var(--muted);margin-left:auto;font-variant-numeric:tabular-nums;white-space:nowrap}
  .card .zhu{font-size:12.5px;color:var(--ink-2);margin:2px 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .res{font-size:12px;color:var(--accent-ink);font-weight:600;margin-bottom:8px}
  .card .open{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:650;color:var(--accent);
    text-decoration:none;border:1px solid var(--hair);border-radius:8px;padding:5px 10px;background:transparent;cursor:pointer;font-family:inherit}
  .card .open:hover{border-color:var(--accent);background:var(--tag)}

  /* 載入更多 */
  .more{margin-top:10px;width:100%;border:1px solid var(--hair);background:var(--surface);color:var(--ink-2);
    border-radius:10px;padding:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .more:hover{border-color:var(--accent);color:var(--accent)}
  .more:disabled{opacity:.55;cursor:default;border-color:var(--hair);color:var(--muted)}
  /* 縮小範圍 chips */
  .narrow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:22px 0 2px}
  .narrow .nl{font-size:11.5px;color:var(--muted);font-weight:600;margin-right:2px}
  .nchip{border:1px solid var(--hair);background:var(--surface);color:var(--ink-2);border-radius:999px;
    padding:4px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
  .nchip:hover{border-color:var(--accent);color:var(--accent)}

  /* generative reveal: staggered card entrance + "searching" indicator */
  .reveal{opacity:0;transform:translateY(8px)}
  .reveal.in{opacity:1;transform:none;transition:opacity .46s ease,transform .46s ease}
  .src-loading{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;margin:12px 0 6px}
  .dots{display:inline-flex;gap:4px}
  .dots i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:dot 1.1s infinite ease-in-out}
  .dots i:nth-child(2){animation-delay:.15s}
  .dots i:nth-child(3){animation-delay:.3s}
  @keyframes dot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  /* 思考中 + 可展開的思考過程 */
  .thinking{margin:2px 0 4px}
  .th-head{display:flex;align-items:center;gap:8px;color:var(--ink-2);font-size:14px}
  .th-toggle{border:0;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;padding:2px 4px}
  .th-toggle:hover{color:var(--accent)}
  .th-detail{margin:7px 0 0 3px;padding-left:11px;border-left:2px solid var(--hair)}
  .th-step{font-size:12px;color:var(--muted);line-height:2;font-variant-numeric:tabular-nums}

  /* right-side judgment preview drawer */
  .chat-root{--pv-w:clamp(400px,42vw,560px);transition:padding-right .24s ease}
  .pv-scrim{position:fixed;inset:0;background:rgba(15,18,24,.32);opacity:0;visibility:hidden;
    transition:opacity .2s;z-index:55}
  .pv-scrim.open{opacity:1;visibility:visible}
  .preview{position:fixed;top:0;right:0;height:100%;width:min(540px,94vw);background:var(--surface);
    border-left:1px solid var(--hair);box-shadow:-14px 0 44px rgba(15,18,24,.18);
    transform:translateX(100%);transition:transform .24s ease;z-index:60;display:flex;flex-direction:column}
  .preview.open{transform:none}
  /* active source card (the one shown in the drawer) */
  .card.active{border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent);background:var(--tag)}
  /* desktop: split / push layout (no scrim; chat shifts left to make room) */
  @media (min-width:900px){
    .pv-scrim{display:none}
    .preview{width:var(--pv-w);box-shadow:-8px 0 24px rgba(15,18,24,.08)}
    .chat-root.drawer-open{padding-right:var(--pv-w)}
  }
  .pv-head{flex:none;display:flex;align-items:flex-start;gap:10px;padding:16px 18px;border-bottom:1px solid var(--hair)}
  .pv-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .pv-title{font-weight:730;font-size:15.5px;line-height:1.4;margin-top:3px;color:var(--ink)}
  .pv-close{margin-left:auto;flex:none;border:1px solid var(--hair);background:transparent;border-radius:8px;
    width:32px;height:32px;cursor:pointer;font-size:18px;line-height:1;color:var(--ink-2)}
  .pv-close:hover{border-color:var(--accent);color:var(--accent)}
  .pv-body{flex:1;overflow-y:auto;padding:16px 18px}
  .pv-meta{display:grid;grid-template-columns:auto 1fr;gap:7px 14px;margin-bottom:16px}
  .pv-meta dt{font-size:12px;color:var(--muted);font-weight:600}
  .pv-meta dd{font-size:13px;color:var(--ink);margin:0;font-variant-numeric:tabular-nums}
  .pv-tags{display:flex;gap:5px;flex-wrap:wrap}
  .pv-sec{font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);
    margin:14px 0 6px;padding-top:12px;border-top:1px solid var(--hair)}
  .pv-zhu{font-size:14px;line-height:1.8;color:var(--ink);white-space:pre-wrap}
  .pv-full{font-size:14px;color:var(--ink)}
  .pv-full .pv-p{margin:0 0 11px;line-height:1.9;text-align:justify}
  .pv-full mark{scroll-margin:80px}
  .pv-note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6}
  .pv-foot{flex:none;padding:12px 18px;border-top:1px solid var(--hair)}
  .pv-src{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;font-size:13.5px;font-weight:650;
    color:#fff;background:var(--accent);border:0;border-radius:10px;padding:11px;text-decoration:none;cursor:pointer}
  .pv-src:hover{background:var(--accent-ink)}

  /* input dock */
  .dock{flex:none;background:linear-gradient(to top,var(--page) 70%,transparent);padding:6px clamp(14px,4vw,22px) 12px}
  .dockcol{max-width:760px;margin:0 auto}
  /* search-mode toggle */
  .modes{display:flex;gap:2px;width:max-content;margin:0 auto 8px;padding:3px;background:var(--surface-2);
    border:1px solid var(--hair);border-radius:999px}
  .modes .mode{border:0;background:transparent;color:var(--ink-2);border-radius:999px;padding:5px 14px;
    font-family:inherit;font-size:12.5px;font-weight:650;cursor:pointer}
  .modes .mode.on{background:var(--accent);color:#fff}
  /* full-text snippet inside a source card */
  .card .snip{font-size:12.5px;line-height:1.7;color:var(--ink-2);margin:2px 0 8px}
  mark{background:rgba(42,111,214,.18);color:inherit;border-radius:2px;padding:0 1px}
  :root[data-theme="dark"] mark{background:rgba(74,146,232,.30)}
  .inbox{display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1px solid var(--hair);
    border-radius:16px;padding:8px 8px 8px 16px}
  .inbox:focus-within{border-color:var(--accent)}
  textarea{flex:1;border:0;outline:0;resize:none;background:transparent;color:var(--ink);font:inherit;font-size:15px;
    line-height:1.5;max-height:160px;padding:6px 0}
  textarea::placeholder{color:var(--muted)}
  .send{flex:none;width:36px;height:36px;border-radius:11px;border:0;background:var(--accent);color:#fff;cursor:pointer;
    display:grid;place-items:center;transition:opacity .12s,background .12s}
  .send:disabled{opacity:.4;cursor:default}
  .send:not(:disabled):hover{background:var(--accent-ink)}
  .disc{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
  .disc b{color:var(--ink-2);font-weight:650}
  @media (prefers-reduced-motion:reduce){.caret::after{animation:none}.ex:hover{transform:none}
    .reveal{opacity:1;transform:none}.src-loading .dots i{animation:none}}

</style>

<header class="hd">
  <div class="right">
    <a class="hbtn stats" id="statsbtn" href="../crosstab.html" target="_blank" rel="noopener">交叉統計</a>
    <button class="hbtn" id="clearbtn" type="button">清除</button>
    <button class="hbtn" id="themebtn" type="button">◐</button>
  </div>
</header>

<main class="scroll" id="scroll">
  <div class="col" id="col">
    <div class="empty" id="empty">
      <h1>醫藥五法判決檢索問答</h1>

<div class="dock">
  <div class="dockcol">

</div>

<div class="pv-scrim" id="pv-scrim"></div>

  </div>
  <div class="pv-body" id="pv-body"></div>
  <div class="pv-foot">
    <a class="pv-src" id="pv-src" target="_blank" rel="noopener">在司法院裁判書系統開啟原文 ↗</a>
  </div>
</aside>

const LAWS=["藥事法","醫療器材管理法","醫療法","醫師法","藥師法"];

  {re:/妨害醫療|打醫|傷醫|恐嚇.*醫|暴力.*醫護|醫護人員/, law:"醫療法", art:"106", name:"妨害醫療業務（醫療法§106）"},

  {re:/病歷/, law:"醫師法", art:"12", name:"病歷（醫師法§12）"},

  {re:/藥師|藥局|調劑/, law:"藥師法", art:null, name:"藥師法"},
];
const CATS=["刑事","民事","行政","懲戒","憲法法庭"];
function detectYear(q){const m=q.match(/(1[01][0-9])\s*年/);return m?parseInt(m[1],10):null;}
function detectCourt(q){const m=q.match(/([一-鿿]{2,5}(?:地方法院|高等法院|地院|高院|最高法院|最高行政法院|憲法法庭))/);
  return m?m[0].replace('地院','地方法院').replace('高院','高等法院'):null;}
function detectCategory(q){for(const c of CATS){if(q.includes(c))return c;}return null;}
function parseIntent(q){
  const filt={}; let label=null;
  for(const law of LAWS){
    if(q.includes(law)){
      filt.laws=[law];
      const m=q.match(/第?\s*(\d+)\s*(?:-|之)\s*(\d+)\s*條|第?\s*(\d+)\s*條/);
      if(m){const a=m[1]?(m[1]+'-'+m[2]):m[3]; filt.article={law,art:a}; label=`${law}§${a}`;}
      else label=law;
      break;
    }
  }
  if(!filt.article && !filt.laws){
    for(const k of KW){ if(k.re.test(q)){ if(k.art){filt.article={law:k.law,art:k.art};} else {filt.laws=[k.law];} label=k.name; break; } }
  }
  const cm=q.match(/違反(藥事法|醫療器材管理法|醫療法|醫師法|藥師法)/);  // 據該法起訴
  if(cm){ filt.causeLaw=cm[1]; if(!filt.laws) filt.laws=[cm[1]]; }
  const yr=detectYear(q); if(yr) filt.year=yr;
  const court=detectCourt(q); if(court) filt.court=court;
  const cat=detectCategory(q); if(cat) filt.category=cat;

}
function query(q){
  const {filt,label}=parseIntent(q);

  if(res.total===0 && Object.keys(filt).length) res=SearchEngine.search('', filt, 8); // filters set but free-text matched nothing
  let statLabel=null, statCount=null;
  if(filt.article){
    const ac=STATS.article_counts&&STATS.article_counts[filt.article.law];
    statCount=(ac&&ac[filt.article.art]!=null)?ac[filt.article.art]:SearchEngine.count({article:filt.article});
    statLabel=`${filt.article.law}§${filt.article.art}`;
  }else if(filt.laws&&filt.laws.length===1){
    statCount=(STATS.per_law&&STATS.per_law[filt.laws[0]]!=null)?STATS.per_law[filt.laws[0]]:SearchEngine.count({laws:filt.laws});
    statLabel=filt.laws[0];
  }
  const fbits=[]; if(filt.causeLaw)fbits.push('據該法起訴'); if(filt.year)fbits.push(filt.year+'年'); if(filt.court)fbits.push(filt.court); if(filt.category)fbits.push(filt.category);
  return {q,filt,label,statLabel,statCount,total:res.total,hits:res.hits,fbits};
}

// 【】-marked snippet -> fragment with <mark>
function hlMarks(s){
  const frag=document.createDocumentFragment(), parts=String(s).split('【');
  parts.forEach((part,idx)=>{
    if(idx===0){frag.appendChild(document.createTextNode(part));return;}
    const j=part.indexOf('】');
    if(j<0){frag.appendChild(document.createTextNode(part));return;}
    const m=document.createElement('mark');m.textContent=part.slice(0,j);frag.appendChild(m);
    frag.appendChild(document.createTextNode(part.slice(j+1)));
  });
  return frag;
}
// highlight given substrings inside plain text -> fragment with <mark>
function hlTerms(text, terms){
  const frag=document.createDocumentFragment();
  if(!terms||!terms.length){frag.appendChild(document.createTextNode(text));return frag;}
  const re=new RegExp('('+terms.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','g');
  let last=0,m;
  while((m=re.exec(text))){
    if(m.index>last)frag.appendChild(document.createTextNode(text.slice(last,m.index)));
    const mk=document.createElement('mark');mk.textContent=m[0];frag.appendChild(mk);
    last=m.index+m[0].length; if(m.index===re.lastIndex)re.lastIndex++;
  }
  if(last<text.length)frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}
// break a run-on judgment body into readable paragraphs (headings, 中華民國 signature, numbered items)
function paragraphs(text){
  const D='';
  const t=String(text)
    .replace(/(主\s*文)/g, D+'$1')
    .replace(/(犯\s*罪\s*事\s*實|事\s*實\s*及\s*理\s*由)/g, D+'$1')
    .replace(/(中\s*華\s*民\s*國)/g, D+'$1')
    .replace(/(附\s*錄|附\s*表)/g, D+'$1')
    .replace(/([一二三四五六七八九十]{1,3}、)/g, D+'$1')
    .replace(/([（(][一二三四五六七八九十0-9]{1,3}[）)])/g, D+'$1')
    .replace(/(\s\d{1,3}[、.．])/g, ' '+D+'$1');
  const parts=t.split(D).map(s=>s.trim()).filter(Boolean);
  return parts.length?parts:[String(text)];
}

const PAGE=8, REVEAL_MS=420;
function buildSourceBlock(hits, onFirst){
  const wrap=document.createElement('div');
  const h=document.createElement('div');h.className='src-h';h.textContent='資料來源 · 司法院裁判書';wrap.appendChild(h);

  let shown=0;

    if(rem>0){more.style.display='';more.textContent=`載入更多（還有 ${rem.toLocaleString()} 件）`;}else more.style.display='none';}
  // scrollMode: 'bottom' = follow to bottom (fresh answer) | 'follow' = gently keep each new card in view (load-more)
  function renderPage(done, scrollMode){
    const slice=hits.slice(shown,shown+PAGE);
    const els=slice.map(r=>{const el=buildCard(r);el.classList.add('reveal');cs.appendChild(el);return el;});
    shown+=slice.length;
    const finishPage=()=>{ updateMore(); done&&done(); };   // reveal 載入更多 only after the page's cards finish
    if(reduce){els.forEach(el=>el.classList.add('in'));finishPage();return;}
    let i=0;(function tick(){
      if(i<els.length){
        const el=els[i]; el.classList.add('in'); i++;
        if(scrollMode==='bottom') toBottom();
        else if(scrollMode==='follow') el.scrollIntoView({block:'nearest',behavior:'smooth'});
        setTimeout(tick,REVEAL_MS);
      } else finishPage();
    })();
  }
  more.addEventListener('click',()=>{ if(more.disabled)return; more.disabled=true; renderPage(()=>{more.disabled=false;}, 'follow'); });
  renderPage(onFirst, 'bottom');
  return wrap;
}

function narrowChips(r){

// strip recognised filter tokens so only free text goes to the full-text engine
function deepFreeText(q){
  let s=' '+q+' ';
  LAWS.forEach(l=>{s=s.split('違反'+l).join(' ').split(l).join(' ');});
  s=s.replace(/第?\s*\d+\s*(?:-|之)?\s*\d*\s*條/g,' ');
  s=s.replace(/1[01][0-9]\s*年/g,' ');
  CATS.forEach(c=>{s=s.split(c).join(' ');});
  s=s.replace(/[一-鿿]{2,5}(?:地方法院|高等法院|地院|高院|最高法院|最高行政法院|憲法法庭)/g,' ');
  return s.replace(/\s+/g,' ').trim();
}
function passDeepFilter(r, filt){
  if(filt.laws&&filt.laws.length && !(r.l||[]).some(l=>filt.laws.indexOf(l)>=0)) return false;
  if(filt.year){ const ry=parseInt((r.d||'').slice(0,4),10)-1911; if(ry!==filt.year) return false; }
  if(filt.category && r.g!==filt.category) return false;
  if(filt.court && (r.c||'').indexOf(filt.court)<0) return false;
  return true;
}
function deepQuery(q){
  const {filt}=parseIntent(q);
  const ft=deepFreeText(q);
  const res=ft?FTS.search(ft):{total:0,hits:[],terms:[]};
  lastTerms=res.terms||[];
  let hits=res.hits.map(h=>Object.assign({}, IDX_BY_ID[h.i]||{i:h.i}, {snip:h.snip}));
  hits=hits.filter(r=>passDeepFilter(r,filt));
  const fbits=[]; if(filt.laws)fbits.push(filt.laws[0]); if(filt.year)fbits.push(filt.year+'年'); if(filt.court)fbits.push(filt.court); if(filt.category)fbits.push(filt.category);
  return {q, deep:true, freeText:ft, filt, label:null, statLabel:null, statCount:null, total:hits.length, hits, fbits};
}

function killEmpty(){if(empty&&empty.parentElement){empty.remove();}}
function toBottom(){scroll.scrollTop=scroll.scrollHeight;}
function autosize(){ta.style.height='auto';ta.style.height=Math.min(160,ta.scrollHeight)+'px';}

ta.addEventListener('input',()=>{autosize();send.disabled=ta.value.trim()===''||busy;});
ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing&&e.keyCode!==229){e.preventDefault();ask();}});
send.addEventListener('click',ask);
$('#clearbtn').onclick=()=>{ if(busy)return; col.innerHTML='';col.appendChild(empty);empty.style.display='';
  // rebuild examples listeners lost? empty node retained, its buttons intact
  toBottom(); };
$('#themebtn').onclick=()=>{const root=document.documentElement;
  const cur=root.getAttribute('data-theme')||'light';
  root.setAttribute('data-theme',cur==='dark'?'light':'dark');};

// ---------- right-side judgment preview drawer ----------
const preview=$('#preview'),scrim=$('#pv-scrim'),appEl=document.getElementById('app');
let activeCard=null;
function metaRow(dt,dd){
  const t=document.createElement('dt');t.textContent=dt;
  const d=document.createElement('dd');
  if(typeof dd==='string'){d.textContent=dd;}else{d.appendChild(dd);}
  return [t,d];
}
function openPreview(r,cardEl){
  $('#pv-title').textContent=`${r.c} ${r.y}年${r.w}字第${r.n}號`;
  const body=$('#pv-body');body.innerHTML='';
  const dl=document.createElement('dl');dl.className='pv-meta';
  const tags=document.createElement('div');tags.className='pv-tags';
  (r.l||[]).forEach(l=>{const s=document.createElement('span');s.className='lt';s.textContent=l;tags.appendChild(s);});
  const rows=[metaRow('裁判日期',r.d),metaRow('類別',r.g||'—'),metaRow('案由',r.u||'—'),metaRow('法規',tags)];
  if(r.a&&r.a.length) rows.push(metaRow('適用條號',r.a.join('、')));
  if(r.r) rows.push(metaRow('判決結果',r.r));
  if(r.b&&r.b.length) rows.push(metaRow('據該法起訴',r.b.join('、')));
  rows.forEach(([t,d])=>{dl.appendChild(t);dl.appendChild(d);});
  body.appendChild(dl);
  if(window.FTS && FTS.ready()){
    const sec=document.createElement('div');sec.className='pv-sec';sec.textContent='裁判書全文';body.appendChild(sec);
    const full=document.createElement('div');full.className='pv-full';
    const txt=FTS.getBody(r.i);
    if(txt){ paragraphs(txt).forEach(p=>{const el=document.createElement('p');el.className='pv-p';el.appendChild(hlTerms(p,lastTerms));full.appendChild(el);}); }
    else { full.textContent='（全文資料庫未收錄此筆）'; }
    body.appendChild(full);
    const fm=full.querySelector('mark');                       // auto-scroll to first hit
    if(fm) setTimeout(()=>fm.scrollIntoView({block:'center',behavior:'smooth'}), 90);
    else body.scrollTop=0;
  }else{
    const note=document.createElement('div');note.className='pv-note';
    note.textContent='整篇裁判書全文需切換到「全文深搜」載入全文資料庫後於此顯示；目前請點下方開啟司法院原文。';
    body.appendChild(note);
  }
  $('#pv-src').href=r.url;
  appEl.classList.add('drawer-open');
  preview.classList.add('open');scrim.classList.add('open');preview.setAttribute('aria-hidden','false');
  if(activeCard) activeCard.classList.remove('active');
  activeCard=cardEl||null;
  if(activeCard){ activeCard.classList.add('active'); activeCard.scrollIntoView({block:'nearest'}); }
}
function closePreview(){
  appEl.classList.remove('drawer-open');
  preview.classList.remove('open');scrim.classList.remove('open');preview.setAttribute('aria-hidden','true');
  if(activeCard){ activeCard.classList.remove('active'); activeCard=null; }
}
$('#pv-close').addEventListener('click',closePreview);
scrim.addEventListener('click',closePreview);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&preview.classList.contains('open'))closePreview();});
autosize();

</script>
